services:
  forse:
    image: forse
    build: .
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forse.rule=Host(`forse.example.com`)"
      - "traefik.http.routers.forse.entrypoints=websecure"
      - "traefik.http.routers.forse.tls.certresolver=letsencrypt"
      - "traefik.http.services.forse.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
