<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="forse" />
<title>Forse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=swap">
<style>
    :root { --fg: #333; --bg: #fff; }
    body.dark { --fg: #ccc; --bg: #111; }
    * { margin: 0 auto; width: 100%; font-family: 'IBM Plex Mono', monospace; text-align: center; color: var(--fg); touch-action: manipulation; transition: color 0.3s, background 0.3s; }
    html { height: -webkit-fill-available; overflow: hidden; }
    body { overscroll-behavior: none; background: var(--bg); height: 100vh; height: -webkit-fill-available; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    #wrapper { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    main#wrapper > a { width: auto; max-width: calc(100% - 48px); font-size: 22px; font-weight: bold; text-decoration: none; transition: opacity 0.2s, color 0.3s; word-break: break-word; }
    #controls { position: fixed; top: 16px; right: 16px; width: auto; display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
    #theme, #share { width: 100%; pointer-events: auto; cursor: pointer; font-size: 12px; background: none; border: none; padding: 4px 8px; margin: 0; opacity: 0.4; letter-spacing: 1px; color: var(--fg); text-align: right; }
    #theme:hover, #share:hover { opacity: 1; }
    #toast { position: fixed; top: 75%; left: 50%; transform: translate(-50%,-50%); font-size: 12px; letter-spacing: 1px; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
    #social { display: flex; align-items: center; justify-content: center; gap: 1ch; }
    .pipe { width: auto; opacity: 0.4; }
    #btn-linkedin, #btn-github { cursor: pointer; font-size: 12px; opacity: 0.4; letter-spacing: 1px; color: var(--fg); text-decoration: none; width: auto; min-width: calc(8ch + 7px); }
    #btn-linkedin:hover, #btn-github:hover { opacity: 1; }
    #btn-linkedin { text-align: right; }
    #btn-github { text-align: left; }
    #copyright { letter-spacing: 1px; }
    #copyright span { opacity: 0.4; }
    .footer { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; font-size: 12px; padding: 16px 0; flex-shrink: 0; }
    .mbr { display: none; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    .shake { animation: shake 0.35s ease; }
    @keyframes exit-left  { from{transform:translateX(0)} to{transform:translateX(-110vw)} }
    @keyframes exit-right { from{transform:translateX(0)} to{transform:translateX(110vw)} }
    @keyframes exit-up    { from{transform:translateY(0)} to{transform:translateY(-110vh)} }
    @keyframes exit-down  { from{transform:translateY(0)} to{transform:translateY(110vh)} }
    @keyframes enter-from-right  { from{transform:translateX(110vw)}  to{transform:translateX(0)} }
    @keyframes enter-from-left   { from{transform:translateX(-110vw)} to{transform:translateX(0)} }
    @keyframes enter-from-bottom { from{transform:translateY(110vh)}  to{transform:translateY(0)} }
    @keyframes enter-from-top    { from{transform:translateY(-110vh)} to{transform:translateY(0)} }
    .sl-exit-l { animation: exit-left  .25s ease forwards; }
    .sl-exit-r { animation: exit-right .25s ease forwards; }
    .sl-exit-u { animation: exit-up    .25s ease forwards; }
    .sl-exit-d { animation: exit-down  .25s ease forwards; }
    .sl-from-r { animation: enter-from-right  .25s ease forwards; }
    .sl-from-l { animation: enter-from-left   .25s ease forwards; }
    .sl-from-b { animation: enter-from-bottom .25s ease forwards; }
    .sl-from-t { animation: enter-from-top    .25s ease forwards; }
    @media (max-width: 768px) { .mbr { display: block; } .sep { display: none; } #copyright { font-size: 9px; } }
    div.footer > p { margin: 0; width: auto; }
</style>
</head>
<body>
    <div id="controls">
        <button id="theme"></button>
        <button id="share">[ copy ]</button>
    </div>
    <div id="toast">[ copied ]</div>
    <main id="wrapper">
        <a href="#" id="tip" rel="nofollow"></a>
    </main>
    <div class="footer">
        <p id="social"><a id="btn-linkedin" href="https://www.linkedin.com/in/mattiapiccinetti/" target="_blank" rel="noopener noreferrer">linkedin</a><span class="pipe">|</span><a id="btn-github" href="https://github.com/mattiapiccinetti/forse" target="_blank" rel="noopener noreferrer">github</a></p>
        <p id="copyright"></p>
    </div>
    <script>
        const tips = JSON.parse(new TextDecoder().decode(Uint8Array.from(atob("{{TIPS}}"),c=>c.charCodeAt(0))));
        const hashes = Object.keys(tips);
        const tip = document.getElementById('tip');
        const themeEl = document.getElementById('theme');
        let currentHash = '';
        const slides = { right:{exit:'sl-exit-l',enter:'sl-from-r'}, left:{exit:'sl-exit-r',enter:'sl-from-l'}, down:{exit:'sl-exit-u',enter:'sl-from-b'}, up:{exit:'sl-exit-d',enter:'sl-from-t'} };
        let busy = false;
        const show = (h, dir) => { if (busy) return; busy = true; tip.classList.remove('shake'); currentHash = h; if (!dir) { tip.style.opacity=0; setTimeout(()=>{ tip.innerHTML=tips[h]; tip.style.opacity=1; busy=false; }, 200); return; } const {exit,enter}=slides[dir]; tip.classList.add(exit); setTimeout(()=>{ tip.classList.remove(exit); tip.innerHTML=tips[h]; tip.classList.add(enter); tip.addEventListener('animationend',()=>{ tip.classList.remove(enter); busy=false; },{once:true}); }, 250); };
        const randHash = () => hashes[Math.floor(Math.random()*hashes.length)];
        const next = e => { e.preventDefault(); show(randHash()); };
        const setDark = dark => { document.body.classList.toggle('dark', dark); themeEl.textContent = dark ? '[ light ]' : '[ dark ]'; localStorage.setItem('theme', dark ? 'dark' : 'light'); };
        document.getElementById('copyright').innerHTML = '<span>&copy; Copyright 2014&ndash;'+new Date().getFullYear()+' Forse</span><span class="sep"> &ndash; </span><br class="mbr"><span>All Rights Reserved</span>';
        const h = window.location.hash.slice(1);
        show(tips[h] !== undefined ? h : randHash());
        setDark(localStorage.getItem('theme') !== 'light');
        document.addEventListener('click', next);
        document.addEventListener('keypress', next);
        document.addEventListener('keydown', e => { const dir={ArrowRight:'right',ArrowLeft:'left',ArrowUp:'up',ArrowDown:'down'}[e.key]; if (dir) { e.preventDefault(); show(randHash(), dir); } });
        let startX = 0, startY = 0;
        document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, {passive: true});
        document.addEventListener('touchend', e => { const dx=e.changedTouches[0].clientX-startX, dy=e.changedTouches[0].clientY-startY, adx=Math.abs(dx), ady=Math.abs(dy); if (adx<60 && ady<60) return; show(randHash(), adx>ady ? (dx<0?'right':'left') : (dy<0?'down':'up')); }, {passive: true});
        themeEl.addEventListener('click', e => { e.stopPropagation(); haptic(); setDark(!document.body.classList.contains('dark')); themeEl.blur(); });
        const shareEl = document.getElementById('share');
        const toastEl = document.getElementById('toast');
        let toastTimer;
        const haptic = (ms = 10) => navigator.vibrate?.(ms);
        const copy = () => { haptic(); navigator.clipboard.writeText('https://mattiapiccinetti.github.io/forse/#' + currentHash); toastEl.style.opacity = 1; clearTimeout(toastTimer); toastTimer = setTimeout(() => { toastEl.style.opacity = 0; }, 1500); tip.classList.remove('shake'); void tip.offsetWidth; tip.classList.add('shake'); };
        shareEl.addEventListener('click', e => { e.stopPropagation(); copy(); shareEl.blur(); });
        tip.addEventListener('click', e => { e.stopPropagation(); e.preventDefault(); copy(); });
        ['btn-linkedin', 'btn-github'].forEach(id => {
            ['click', 'keypress'].forEach(evt => document.getElementById(id).addEventListener(evt, e => e.stopPropagation()));
        });
    </script>
</body>
</html>
