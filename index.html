<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="forse" />
<title>Forse</title>
<style>
    * { margin: 0 auto; width: 100%; font-family: Courier; text-align: center; color: #333; }
    #wrapper { height: 85vh; display: table; }
    main#wrapper > a { display: table-cell; vertical-align: middle; font-size: 24px; font-weight: bold; text-decoration: none; transition: opacity 0.2s; }
    .social { height: 5vh; }
    .footer { height: 10vh; display: table; font-size: 11px; }
    div.footer > p { display: table-cell; vertical-align: middle; }
</style>
</head>
<body>
    <main id="wrapper">
        <a href="#" id="tip" rel="nofollow"></a>
    </main>
    <div class="social">
        <a href="https://twitter.com/intent/follow?screen_name=peachofpersia">Follow @peachofpersia</a>
    </div>
    <div class="footer">
        <p id="copyright"></p>
    </div>
    <script>
        const tips = new TextDecoder().decode(Uint8Array.from(atob("{{TIPS}}"),c=>c.charCodeAt(0))).trim().split('\n');
        const tip = document.getElementById('tip');
        const show = t => { tip.style.opacity=0; setTimeout(()=>{ tip.innerHTML=t; tip.style.opacity=1; }, 200); };
        const rand = () => tips[Math.floor(Math.random()*tips.length)];
        const next = e => { e.preventDefault(); show(rand()); };
        document.getElementById('copyright').innerHTML = '&copy; Copyright 2014&ndash;'+new Date().getFullYear()+' Forse &mdash; All Rights Reserved';
        tip.innerHTML = rand();
        document.getElementById('wrapper').addEventListener('click', next);
        document.addEventListener('keypress', next);
    </script>
</body>
</html>
