<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="forse" />
<title>Forse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=swap">
<style>
    :root { --fg: #333; --bg: #fff; }
    body.dark { --fg: #ccc; --bg: #111; }
    * { margin: 0 auto; width: 100%; font-family: 'IBM Plex Mono', monospace; text-align: center; color: var(--fg); touch-action: manipulation; transition: color 0.3s, background 0.3s; }
    html, body { overscroll-behavior: none; background: var(--bg); min-height: 100vh; }
    #wrapper { height: 85vh; display: table; }
    main#wrapper > a { display: table-cell; vertical-align: middle; font-size: 22px; font-weight: bold; text-decoration: none; transition: opacity 0.2s, color 0.3s; }
    .footer { height: 10vh; display: table; font-size: 12px; }
    div.footer > p { display: table-cell; vertical-align: middle; }
    #controls { position: fixed; bottom: 16px; left: 0; right: 0; display: flex; justify-content: center; gap: 24px; pointer-events: none; }
    #theme, #btn-linkedin, #btn-github { pointer-events: auto; cursor: pointer; font-size: 12px; background: none; border: none; padding: 4px 0; margin: 0; opacity: 0.4; letter-spacing: 1px; color: var(--fg); text-decoration: none; }
    #theme:hover, #btn-linkedin:hover, #btn-github:hover { opacity: 1; }
</style>
</head>
<body>
    <div id="controls">
        <button id="theme"></button>
        <a id="btn-linkedin" href="https://www.linkedin.com/in/mattiapiccinetti/" target="_blank" rel="noopener noreferrer">[linkedin]</a>
        <a id="btn-github" href="https://github.com/mattiapiccinetti/forse" target="_blank" rel="noopener noreferrer">[github]</a>
    </div>
    <main id="wrapper">
        <a href="#" id="tip" rel="nofollow"></a>
    </main>
    <div class="footer">
        <p id="copyright"></p>
    </div>
    <script>
        const tips = JSON.parse(new TextDecoder().decode(Uint8Array.from(atob("{{TIPS}}"),c=>c.charCodeAt(0))));
        const hashes = Object.keys(tips);
        const tip = document.getElementById('tip');
        const themeEl = document.getElementById('theme');
        const show = h => { tip.style.opacity=0; setTimeout(()=>{ tip.innerHTML=tips[h]; tip.style.opacity=1; }, 200); history.replaceState(null,'','#'+h); };
        const randHash = () => hashes[Math.floor(Math.random()*hashes.length)];
        const next = e => { e.preventDefault(); show(randHash()); };
        const setDark = dark => { document.body.classList.toggle('dark', dark); themeEl.textContent = dark ? '[light]' : '[dark]'; localStorage.setItem('theme', dark ? 'dark' : 'light'); };
        document.getElementById('copyright').innerHTML = '&copy; Copyright 2014&ndash;'+new Date().getFullYear()+' Forse &mdash; All Rights Reserved';
        const h = window.location.hash.slice(1);
        show(tips[h] !== undefined ? h : randHash());
        setDark(localStorage.getItem('theme') !== 'light');
        document.addEventListener('click', next);
        document.addEventListener('keypress', next);
        let startY = 0;
        document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive: true});
        document.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - startY > 60) show(randHash()); }, {passive: true});
        themeEl.addEventListener('click', e => { e.stopPropagation(); setDark(!document.body.classList.contains('dark')); });
        ['btn-linkedin', 'btn-github'].forEach(id => {
            ['click', 'keypress'].forEach(evt => document.getElementById(id).addEventListener(evt, e => e.stopPropagation()));
        });
    </script>
</body>
</html>
