name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - name: Build
        run: |
          ENCODED=$(base64 -w0 tips.txt)
          sed "s|{{TIPS}}|$ENCODED|g" index.html > /tmp/built.html
          echo '{"collapseWhitespace":true,"removeComments":true,"removeOptionalTags":true,"removeRedundantAttributes":true,"minifyCSS":true,"minifyJS":{"compress":true,"mangle":true}}' > /tmp/minifier.json
          npx --yes html-minifier-terser --config-file /tmp/minifier.json /tmp/built.html -o index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: pages
        uses: actions/deploy-pages@v4

      - name: Set Heroku maintenance page URL
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          curl -sf -X PATCH https://api.heroku.com/apps/forse/config-vars \
            -H "Authorization: Bearer $HEROKU_API_KEY" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            -d '{"MAINTENANCE_PAGE_URL": "https://mattiapiccinetti.github.io/forse/"}'
